---
# =================================================================
# STEP 1: COMMON CONFIGURATION (Run on ALL Nodes)
# =================================================================
- name: Prepare all nodes for Kubernetes
  hosts: aws_role_master:aws_role_worker
  become: true
  tasks:
    - name: Update apt cache and install prerequisites
      apt:
        update_cache: yes
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - containerd
        state: present

    - name: Configure containerd to use systemd cgroup
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
      notify: Restart containerd

    - name: Disable swap (Required by Kubernetes)
      command: swapoff -a
      changed_when: false

    - name: Remove swap from /etc/fstab to persist reboot
      replace:
        path: /etc/fstab
        regexp: "^([^#].*swap.*)$"
        replace: '# \1'

    - name: Enable kernel modules for container runtime
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl parameters for networking
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: yes
      loop:
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { name: "net.ipv4.ip_forward", value: "1" }

    - name: Create directory for Kubernetes apt keyring
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Kubernetes apt repository signing key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"

    - name: Add Kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes

    - name: Install Kubernetes binaries (kubelet, kubeadm, kubectl)
      apt:
        update_cache: yes
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted

    # Note: Modern K8s installations require a container runtime (like containerd)
    # and the official Kubernetes apt repository to install kubelet, kubeadm, and kubectl.

# =================================================================
# STEP 2: MASTER NODE INITIALIZATION (Run ONLY on Master)
# =================================================================
- name: Initialize Kubernetes Control Plane
  hosts: aws_role_master
  become: true
  tasks:
    - name: Initialize the cluster using kubeadm
      command: kubeadm init --pod-network-cidr=10.244.0.0/16
      register: kubeadm_init
      changed_when: "'Your Kubernetes control-plane has initialized successfully!' in kubeadm_init.stdout"
      # Prevent running it again if already initialized
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for local user setup
      file:
        path: $HOME/.kube
        state: directory
        mode: "0755"

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: $HOME/.kube/config
        remote_src: yes
        mode: "0600"

    - name: Install Flannel CNI network overlay
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      changed_when: true

    - name: Generate join token command for worker nodes
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Set join command as a global fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

    - name: Create namespace for Argo CD
      command: kubectl create namespace argocd
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Apply Argo CD installation manifests
      command: kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      changed_when: true

    - name: Expose Argo CD Server via NodePort
      command: >
        kubectl patch svc argocd-server -n argocd -p 
        '{"spec": {"type": "NodePort", "ports": [{"name": "http", "port": 80, "targetPort": 8080, "nodePort": 30080}, {"name": "https", "port": 443, "targetPort": 8080, "nodePort": 30443}]}}'
      changed_when: true

    - name: Install Helm via snap
      snap:
        name: helm
        classic: yes

    - name: Create namespace for monitoring
      command: kubectl create namespace monitoring
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add Prometheus community Helm repository
      command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      changed_when: true
      failed_when: false

    - name: Update Helm repository cache
      command: helm repo update
      changed_when: true
      failed_when: false

    - name: Install kube-prometheus-stack Helm chart
      command: >
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack 
        --namespace monitoring 
        --set prometheus.service.type=NodePort 
        --set prometheus.service.nodePort=30090
        --set grafana.service.type=NodePort 
        --set grafana.service.nodePort=30091
      changed_when: true

# =================================================================
# STEP 3: WORKERS JOIN THE CLUSTER (Run ONLY on Workers)
# =================================================================
- name: Join Worker Nodes to the Cluster
  hosts: aws_role_worker
  become: true
  tasks:
    - name: Check if node is already part of the cluster
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join the worker node to the cluster
      command: "{{ hostvars[groups['aws_role_master'][0]]['join_command'] }}"
      when: not kubelet_conf.stat.exists
